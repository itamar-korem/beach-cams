name: Check & Heal Streams

on:
  schedule:
    - cron: '0 6 * * *'  # Every day at 6am UTC (8am Israel time)
  workflow_dispatch:      # Allow manual trigger

jobs:
  check-and-heal:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run self-healing script
        id: heal
        run: |
          node fix-streams.js
          if git diff --quiet index.html; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updated stream URLs
        if: steps.heal.outputs.changed == 'true'
        run: |
          git config user.name "Stream Bot"
          git config user.email "bot@users.noreply.github.com"
          git add index.html
          git commit -m "🔧 Auto-fix broken stream URLs [$(date '+%Y-%m-%d')]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open issue if healing failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'stream-down'
            });
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🚨 Stream broken & could not auto-fix — ' + new Date().toISOString().split('T')[0],
                body: 'The daily stream check ran but could not automatically find a replacement URL.\n\nManual intervention needed — check the [Actions log](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions) for details.',
                labels: ['stream-down']
              });
            }

      - name: Close resolved issues
        if: success() && steps.heal.outputs.changed != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'stream-down'
            });
            for (const issue of issues.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '✅ All streams are back online. Auto-closing.'
              });
            }
