name: Check & Heal Streams

on:
  schedule:
    - cron: '0 * * * *'  # Every hour, on the hour (UTC)
  workflow_dispatch:

jobs:
  check-and-heal:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run self-healing script
        id: heal
        run: |
          set +e
          node fix-streams.js
          heal_exit_code=$?
          echo "heal_exit_code=$heal_exit_code" >> "$GITHUB_OUTPUT"
          if [ "$heal_exit_code" -eq 0 ]; then
            echo "failed=false" >> "$GITHUB_OUTPUT"
          else
            echo "failed=true" >> "$GITHUB_OUTPUT"
          fi
          if git diff --quiet index.html; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Commit and push updated stream URLs
        if: steps.heal.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Stream Bot"
          git config user.email "bot@users.noreply.github.com"
          git add index.html
          git commit -m "Auto-fix broken stream URLs [$(date '+%Y-%m-%d')]"
          git push

      - name: Open issue if healing failed
        if: steps.heal.outputs.failed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'stream-down'
            });
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Stream broken and could not auto-fix - ' + new Date().toISOString().split('T')[0],
                body: 'The hourly stream check ran but could not automatically find a replacement URL.\n\nManual intervention needed - check the [Actions log](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions) for details.',
                labels: ['stream-down']
              });
            }

      - name: Close resolved issues
        if: steps.heal.outputs.failed != 'true' && steps.heal.outputs.changed != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'stream-down'
            });
            for (const issue of issues.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: 'All streams are back online. Auto-closing.'
              });
            }
